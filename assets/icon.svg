<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background: rounded dark square -->
  <rect x="8" y="8" width="240" height="240" rx="32" ry="32" fill="#2D2D2D"/>
  <rect x="8" y="8" width="240" height="240" rx="32" ry="32" fill="none" stroke="#3D3D3D" stroke-width="2"/>

  <!-- 3D Cube wireframe in orange -->
  <!-- Front face -->
  <polygon points="80,100 148,100 148,180 80,180" fill="none" stroke="#E87D0D" stroke-width="4" stroke-linejoin="round"/>
  <!-- Top face -->
  <polygon points="80,100 112,72 180,72 148,100" fill="none" stroke="#E87D0D" stroke-width="4" stroke-linejoin="round"/>
  <!-- Right face -->
  <polygon points="148,100 180,72 180,152 148,180" fill="none" stroke="#E87D0D" stroke-width="4" stroke-linejoin="round"/>
  <!-- Slight fill for depth -->
  <polygon points="80,100 148,100 148,180 80,180" fill="#E87D0D" opacity="0.1"/>
  <polygon points="80,100 112,72 180,72 148,100" fill="#E87D0D" opacity="0.15"/>
  <polygon points="148,100 180,72 180,152 148,180" fill="#E87D0D" opacity="0.05"/>

  <!-- Microphone in white (right side, smaller) -->
  <!-- Mic body -->
  <rect x="194" y="130" width="24" height="40" rx="12" ry="12" fill="none" stroke="#E0E0E0" stroke-width="3"/>
  <!-- Mic arc -->
  <path d="M190,160 Q190,185 206,185 Q222,185 222,160" fill="none" stroke="#E0E0E0" stroke-width="3" stroke-linecap="round"/>
  <!-- Mic stand -->
  <line x1="206" y1="185" x2="206" y2="198" stroke="#E0E0E0" stroke-width="3" stroke-linecap="round"/>
  <line x1="196" y1="198" x2="216" y2="198" stroke="#E0E0E0" stroke-width="3" stroke-linecap="round"/>

  <!-- "3D" text top-left -->
  <text x="48" y="60" font-family="sans-serif" font-size="28" font-weight="bold" fill="#E87D0D">3D</text>
</svg>
